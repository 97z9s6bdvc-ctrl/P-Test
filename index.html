<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P Test Ver.0.2</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎰 P Test</h1>

<div id="game">

    <div id="screen">

        <div id="lcd">

            <div id="message">
                待機中
            </div>

            <div id="ballArea">

                <div id="ball">
                    ●
                </div>

                <div id="heso">
                    ▼
                </div>

            </div>

        </div>

        <div id="reserveArea">

            <span>保留</span>

            <div id="reserve">

                <div class="reserveSlot"></div>
                <div class="reserveSlot"></div>
                <div class="reserveSlot"></div>
                <div class="reserveSlot"></div>

            </div>

        </div>

    </div>

    <div id="status">

        <div>
        
持ち玉：<span id="balls">250</span>発
貸玉：<span id="loan">1</span>回
回転数：<span id="spin">0</span>

        </div>

        <div id="needleMessage">
            釘：？？？
        </div>

    </div>

    <div id="buttons">

        <button id="startButton">
            ▶️ 打ち出し開始
        </button>

        <button id="stopButton">
            ⏸️ 停止
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
